<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="theme-color" content="#1B3A2D" />
  <meta name="description" content="A shared meal planner for Gyaan and Mehak." />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>Meal Planner · Gyaan & Mehak</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,700;1,9..144,300;1,9..144,500&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="header">
  <div class="header-row">
    <div class="brand">
      Gyaan &amp; Mehak
      <small>Meal Planner</small>
    </div>
    <div class="week-chip" id="weekChip">Week — · —</div>
  </div>
  <div class="toggle-track">
    <button class="p-btn on" data-p="gyaan" onclick="setPerson('gyaan',this)">💪 Gyaan</button>
    <button class="p-btn"    data-p="mehak" onclick="setPerson('mehak',this)">🌸 Mehak</button>
  </div>
  <div class="stats-bar" id="statsBar"></div>
  <div class="header-line"></div>
</header>

<main class="content">
  <div class="tab-panel on" id="tab-today">
    <div class="today-hd">
      <h2 id="dayName">—</h2>
      <p id="daySubtitle">—</p>
    </div>
    <div id="alertBox"></div>
    <div id="todayProgress"></div>
    <div id="todayMeals"></div>
    <div id="snackCard"></div>
    <div id="dayTotal"></div>
    <div id="tomorrowSection"></div>
  </div>

  <div class="tab-panel" id="tab-week">
    <div class="week-hd">
      <h2 id="weekTitle">—</h2>
      <p id="weekDesc">—</p>
    </div>
    <div id="weekDays"></div>
  </div>

  <div class="tab-panel" id="tab-shop">
    <div class="shop-hd">
      <h2>Shopping</h2>
      <p id="shopSub">—</p>
    </div>
    <div class="shop-tabs">
      <button class="st-btn on" onclick="setShopTab('weekly',this)">📦 Weekly Base</button>
      <button class="st-btn"    onclick="setShopTab('daily',this)">🛒 Daily Top-up</button>
    </div>
    <div class="shop-panel on" id="sp-weekly"></div>
    <div class="shop-panel"    id="sp-daily"></div>
  </div>
</main>

<nav class="bnav">
  <button class="nb on" id="nb-today" onclick="setTab('today',this)">
    <span class="nb-ic">☀️</span><span class="nb-lbl">Today</span>
  </button>
  <button class="nb" id="nb-week" onclick="setTab('week',this)">
    <span class="nb-ic">📅</span><span class="nb-lbl">Week</span>
  </button>
  <button class="nb" id="nb-shop" onclick="setTab('shop',this)">
    <span class="nb-ic">🛍️</span><span class="nb-lbl">Shop</span>
  </button>
</nav>

<script src="data.js"></script>
<script src="script.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
      navigator.serviceWorker.register('./sw.js').catch(function (error) {
        console.warn('Service worker registration failed', error);
      });
    });
  }
</script>
</body>
</html>
