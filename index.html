<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>Meal Planner · Gyaan & Mehak</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,700;1,9..144,300;1,9..144,500&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #F7F6F0;
      --card: #FFFFFF;
      --text: #1A1A16;
      --muted: #9A9990;
      --border: #E5E3DA;
      --primary: #1B3A2D;
      --accent: #D4704A;
      --green: #1A7A46;
      --orange: #D96B00;
      --blue: #2457D8;
      --coral: #D4704A;
      --radius: 16px;
      --shadow: 0 2px 14px rgba(0,0,0,0.055);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      padding-bottom: calc(82px + env(safe-area-inset-bottom, 0px));
      -webkit-font-smoothing: antialiased;
    }

    /* ─── HEADER ─── */
    .header {
      padding: calc(env(safe-area-inset-top, 20px) + 14px) 18px 0;
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 14px;
    }

    .brand {
      font-family: 'Fraunces', serif;
      font-size: 21px;
      font-weight: 500;
      color: var(--primary);
      line-height: 1.15;
    }

    .brand small {
      display: block;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 400;
      color: var(--muted);
      margin-top: 1px;
    }

    .week-chip {
      background: var(--primary);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.03em;
      padding: 5px 12px;
      border-radius: 999px;
      white-space: nowrap;
    }

    .toggle-track {
      display: flex;
      background: var(--border);
      border-radius: 999px;
      padding: 3px;
      gap: 2px;
      margin-bottom: 12px;
    }

    .p-btn {
      flex: 1;
      border: 0;
      background: transparent;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      padding: 9px 16px;
      border-radius: 999px;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--muted);
    }

    .p-btn[data-p="gyaan"].on {
      background: var(--blue);
      color: #fff;
      box-shadow: 0 2px 12px rgba(36,87,216,0.38);
    }

    .p-btn[data-p="mehak"].on {
      background: var(--coral);
      color: #fff;
      box-shadow: 0 2px 12px rgba(212,112,74,0.38);
    }

    .stats-bar {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 9px 13px;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .s-chip {
      font-size: 12px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 999px;
    }

    .s-chip.pro { background: rgba(26,122,70,0.1); color: var(--green); }
    .s-chip.cal { background: rgba(217,107,0,0.1); color: var(--orange); }

    .s-note {
      font-size: 11px;
      color: var(--muted);
      margin-left: auto;
      font-style: italic;
    }

    .header-line { height: 1px; background: var(--border); }

    /* ─── CONTENT ─── */
    .content { padding: 18px 18px 10px; }

    .tab-panel { display: none; }
    .tab-panel.on { display: block; animation: fadeUp 0.22s ease; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(7px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── TODAY ─── */
    .today-hd { margin-bottom: 16px; }

    .today-hd h2 {
      font-family: 'Fraunces', serif;
      font-size: 38px;
      font-weight: 500;
      color: var(--primary);
      line-height: 1;
    }

    .today-hd p { font-size: 13px; color: var(--muted); margin-top: 4px; }

    .protein-alert {
      background: rgba(212,112,74,0.1);
      border: 1px solid rgba(212,112,74,0.3);
      border-radius: 12px;
      padding: 10px 13px;
      margin-bottom: 12px;
      font-size: 12px;
      color: var(--coral);
      font-weight: 500;
      display: flex;
      gap: 8px;
      align-items: flex-start;
      line-height: 1.5;
    }

    /* ─── MEAL CARD ─── */
    .meal-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 11px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .mc-hd {
      padding: 12px 15px;
      display: flex;
      align-items: center;
      gap: 9px;
      border-bottom: 1px solid var(--border);
      background: rgba(27,58,45,0.025);
    }

    .mc-emoji { font-size: 17px; }
    .mc-title { font-size: 14px; font-weight: 700; flex: 1; }
    .mc-time { font-size: 11px; color: var(--muted); }

    .opt-row {
      padding: 11px 15px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
    }

    .opt-row:last-child { border-bottom: 0; }

    .opt-num {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.07em;
      background: var(--border);
      color: var(--muted);
      padding: 2px 6px;
      border-radius: 4px;
      margin-bottom: 3px;
    }

    .opt-name { font-size: 14px; font-weight: 500; line-height: 1.3; }

    .opt-portion {
      font-size: 11px;
      color: var(--muted);
      margin-top: 3px;
      line-height: 1.4;
    }

    .opt-portion strong { color: var(--text); font-weight: 600; }

    .opt-macs { display: flex; flex-direction: column; gap: 3px; align-items: flex-end; flex-shrink: 0; }

    .yt-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 30px;
      height: 30px;
      background: rgba(255,0,0,0.07);
      border-radius: 8px;
      text-decoration: none;
      font-size: 13px;
      flex-shrink: 0;
      transition: background 0.15s;
    }

    .yt-btn:active { background: rgba(255,0,0,0.18); }

    .mac {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 999px;
      font-weight: 600;
      white-space: nowrap;
    }

    .mac.p { background: rgba(26,122,70,0.1); color: var(--green); }
    .mac.c { background: rgba(217,107,0,0.1); color: var(--orange); }


    .opt-row.selectable { cursor: pointer; position: relative; transition: background 0.15s, border-left 0.15s; }
    .opt-row.selectable::before {
      content: '';
      width: 20px;
      height: 20px;
      border-radius: 999px;
      border: 2px solid var(--border);
      flex-shrink: 0;
      margin-top: 2px;
      transition: all 0.15s;
    }
    .opt-row.selectable.selected { background: rgba(26,122,70,0.055); }
    .opt-row.selectable.selected::before {
      content: '✓';
      background: var(--green);
      border-color: var(--green);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 800;
    }
    .selected-note {
      font-size: 10px;
      color: var(--green);
      font-weight: 700;
      margin-top: 4px;
    }

    /* ─── SNACK ─── */
    .snack-card {
      background: var(--card);
      border: 1.5px dashed;
      border-radius: var(--radius);
      padding: 13px 15px;
      margin-bottom: 11px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .snack-card.gyaan { border-color: rgba(36,87,216,0.3); }
    .snack-card.mehak { border-color: rgba(212,112,74,0.28); }

    .snack-emoji { font-size: 22px; flex-shrink: 0; }
    .snack-body { flex: 1; }

    .snack-title { font-size: 13px; font-weight: 600; }
    .snack-card.gyaan .snack-title { color: var(--blue); }
    .snack-card.mehak .snack-title { color: var(--coral); }

    .snack-desc { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .snack-macs { display: flex; flex-direction: column; gap: 3px; align-items: flex-end; flex-shrink: 0; }

    /* ─── DAY TOTAL ─── */
    .day-total {
      background: var(--primary);
      color: #fff;
      border-radius: var(--radius);
      padding: 16px 18px;
      margin-top: 2px;
    }

    .dt-label-top {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      opacity: 0.5;
      font-weight: 700;
      margin-bottom: 14px;
    }

    .dt-block { margin-bottom: 14px; }

    .dt-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 5px; }

    .dt-key { font-size: 13px; opacity: 0.75; }
    .dt-val { font-family: 'Fraunces', serif; font-size: 20px; font-weight: 500; }

    .dt-bar { background: rgba(255,255,255,0.18); border-radius: 999px; height: 5px; }
    .dt-fill { height: 100%; border-radius: 999px; background: rgba(255,255,255,0.75); transition: width 0.45s ease; }

    .dt-sub { font-size: 10px; opacity: 0.45; margin-top: 3px; }

    .dt-footer {
      font-size: 10px;
      opacity: 0.4;
      text-align: center;
      padding-top: 12px;
      border-top: 1px solid rgba(255,255,255,0.12);
      margin-top: 4px;
    }

    /* ─── WEEK ─── */
    .week-hd { margin-bottom: 18px; }

    .week-hd h2 { font-family: 'Fraunces', serif; font-size: 30px; font-weight: 500; color: var(--primary); }

    .week-hd p { font-size: 13px; color: var(--muted); margin-top: 3px; }

    .day-acc {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 9px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .day-acc.today-acc { border-color: var(--accent); border-width: 1.5px; }

    .day-acc-btn {
      width: 100%;
      border: 0;
      background: transparent;
      padding: 14px 15px;
      display: flex;
      align-items: center;
      gap: 11px;
      cursor: pointer;
      text-align: left;
    }

    .day-dot {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      background: var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      line-height: 1;
    }

    .day-dot.today-dot { background: var(--accent); color: #fff; }

    .day-dot span:first-child { font-size: 10px; font-weight: 800; letter-spacing: 0.04em; }
    .day-dot span:last-child { font-size: 8px; font-weight: 600; opacity: 0.8; margin-top: 1px; }

    .dai-name { font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 7px; }

    .today-badge {
      font-size: 10px;
      background: var(--accent);
      color: #fff;
      padding: 2px 7px;
      border-radius: 999px;
      font-weight: 700;
    }

    .dai-note { font-size: 12px; color: var(--muted); margin-top: 1px; }

    .day-meta { text-align: right; flex-shrink: 0; margin-right: 6px; }
    .day-meta-pro { font-size: 11px; color: var(--green); font-weight: 700; }
    .day-meta-cal { font-size: 10px; color: var(--muted); margin-top: 1px; }

    .acc-arrow { font-size: 16px; color: var(--muted); transition: transform 0.2s ease; flex-shrink: 0; }
    .day-acc.open .acc-arrow { transform: rotate(180deg); }

    .day-acc-body {
      display: none;
      padding: 4px 15px 15px;
      border-top: 1px solid var(--border);
    }

    .day-acc.open .day-acc-body { display: block; }

    .mini-meal { padding: 9px 0; border-bottom: 1px solid var(--border); }
    .mini-meal:last-child { border-bottom: 0; }

    .mini-title {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
      margin-bottom: 5px;
    }

    .mini-opt { display: flex; align-items: center; gap: 7px; padding: 3px 0; }

    .mini-tag {
      font-size: 9px;
      background: var(--border);
      color: var(--muted);
      padding: 2px 5px;
      border-radius: 3px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .mini-name { font-size: 13px; flex: 1; }
    .mini-macs { display: flex; gap: 4px; flex-shrink: 0; }

    /* ─── SHOP ─── */
    .shop-hd { margin-bottom: 18px; }

    .shop-hd h2 { font-family: 'Fraunces', serif; font-size: 30px; font-weight: 500; color: var(--primary); }

    .shop-hd p { font-size: 13px; color: var(--muted); margin-top: 3px; }

    .shop-tabs { display: flex; gap: 8px; margin-bottom: 18px; }

    .st-btn {
      flex: 1;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      padding: 10px;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .st-btn.on { background: var(--primary); color: #fff; border-color: var(--primary); }

    .shop-panel { display: none; }
    .shop-panel.on { display: block; animation: fadeUp 0.2s ease; }

    .shop-group { margin-bottom: 20px; }

    .sg-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--muted);
      font-weight: 700;
      margin-bottom: 9px;
    }

    .shop-item {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 11px 13px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 6px;
      cursor: pointer;
      transition: opacity 0.15s;
      -webkit-user-select: none;
      user-select: none;
    }

    .shop-item.done { opacity: 0.4; }
    .shop-item.done .si-name { text-decoration: line-through; }

    .chk {
      width: 22px;
      height: 22px;
      border-radius: 7px;
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 13px;
      transition: all 0.15s;
      color: transparent;
    }

    .shop-item.done .chk { background: var(--green); border-color: var(--green); color: #fff; }

    .si-name { flex: 1; font-size: 14px; font-weight: 500; }
    .si-qty { font-size: 12px; color: var(--muted); flex-shrink: 0; }

    .shop-note-box {
      background: rgba(27,58,45,0.04);
      border-radius: 12px;
      padding: 12px;
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
      line-height: 1.5;
    }

    /* ─── BOTTOM NAV ─── */
    .bnav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 200;
      background: rgba(255,255,255,0.96);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      padding: 8px 20px calc(env(safe-area-inset-bottom, 0px) + 8px);
      display: flex;
      justify-content: space-around;
    }

    .nb {
      border: 0;
      background: transparent;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 7px 22px;
      border-radius: 14px;
      cursor: pointer;
      transition: background 0.15s;
      min-width: 68px;
    }

    .nb.on { background: rgba(27,58,45,0.08); }

    .nb-ic { font-size: 21px; }

    .nb-lbl {
      font-family: 'DM Sans', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .nb.on .nb-lbl { color: var(--primary); }

    ::-webkit-scrollbar { display: none; }

    /* ─── TOMORROW / NEXT WEEK ─── */
    .section-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 22px 0 16px;
    }

    .sd-line { flex: 1; height: 1px; background: var(--border); }

    .sd-label {
      font-family: 'Fraunces', serif;
      font-size: 22px;
      font-weight: 500;
      color: var(--muted);
      white-space: nowrap;
    }

    .sd-chip {
      font-size: 11px;
      background: var(--border);
      color: var(--muted);
      padding: 3px 10px;
      border-radius: 999px;
      font-weight: 600;
      white-space: nowrap;
    }

    .nw-week-header {
      background: rgba(27,58,45,0.05);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .nw-week-title {
      font-family: 'Fraunces', serif;
      font-size: 18px;
      font-weight: 500;
      color: var(--primary);
    }

    .nw-week-desc {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }

    .day-acc.next-week-acc { opacity: 0.85; }
  </style>
</head>
<body>

<header class="header">
  <div class="header-row">
    <div class="brand">
      Gyaan &amp; Mehak
      <small>Meal Planner</small>
    </div>
    <div class="week-chip" id="weekChip">Week — · —</div>
  </div>
  <div class="toggle-track">
    <button class="p-btn on" data-p="gyaan" onclick="setPerson('gyaan',this)">💪 Gyaan</button>
    <button class="p-btn"    data-p="mehak" onclick="setPerson('mehak',this)">🌸 Mehak</button>
  </div>
  <div class="stats-bar" id="statsBar"></div>
  <div class="header-line"></div>
</header>

<main class="content">
  <div class="tab-panel on" id="tab-today">
    <div class="today-hd">
      <h2 id="dayName">—</h2>
      <p id="daySubtitle">—</p>
    </div>
    <div id="alertBox"></div>
    <div id="todayMeals"></div>
    <div id="snackCard"></div>
    <div id="dayTotal"></div>
    <div id="tomorrowSection"></div>
  </div>

  <div class="tab-panel" id="tab-week">
    <div class="week-hd">
      <h2 id="weekTitle">—</h2>
      <p id="weekDesc">—</p>
    </div>
    <div id="weekDays"></div>
  </div>

  <div class="tab-panel" id="tab-shop">
    <div class="shop-hd">
      <h2>Shopping</h2>
      <p id="shopSub">—</p>
    </div>
    <div class="shop-tabs">
      <button class="st-btn on" onclick="setShopTab('weekly',this)">📦 Weekly Base</button>
      <button class="st-btn"    onclick="setShopTab('daily',this)">🛒 Daily Top-up</button>
    </div>
    <div class="shop-panel on" id="sp-weekly"></div>
    <div class="shop-panel"    id="sp-daily"></div>
  </div>
</main>

<nav class="bnav">
  <button class="nb on" id="nb-today" onclick="setTab('today',this)">
    <span class="nb-ic">☀️</span><span class="nb-lbl">Today</span>
  </button>
  <button class="nb" id="nb-week" onclick="setTab('week',this)">
    <span class="nb-ic">📅</span><span class="nb-lbl">Week</span>
  </button>
  <button class="nb" id="nb-shop" onclick="setTab('shop',this)">
    <span class="nb-ic">🛍️</span><span class="nb-lbl">Shop</span>
  </button>
</nav>

<script>
/* ════════════════════════════════════
   PERSONS
════════════════════════════════════ */
const PERSONS = {
  gyaan: {
    label:'Gyaan', emoji:'💪',
    proMin:100, proMax:120, calMin:1200, calMax:1300,
    pFactor:1.0, cFactor:1.0,
    snack:{ emoji:'🥛', label:'Afternoon Whey Shake', desc:'Required daily — bridges the gap to 100g+ protein', pro:25, cal:150 },
    note:'+whey daily · full portions'
  },
  mehak: {
    label:'Mehak', emoji:'🌸',
    proMin:70, proMax:90, calMin:1200, calMax:1300,
    pFactor:0.78, cFactor:0.90,
    snack:{ emoji:'🥚', label:'Midday Curd + 1 Boiled Egg', desc:'Optional — adds ~13g on high-activity days', pro:13, cal:130 },
    note:'~80% protein portions · no whey needed'
  }
};

/* ════════════════════════════════════
   MEAL DATA
════════════════════════════════════ */
function o(n,p,c){ return {n,p,c}; }
function m(title,ic,time,o1,o2){ return {title,ic,time,opts:[o1,o2]}; }
function d(name,note,...meals){ return {name,note,meals}; }

const PLAN = {
  week1:{
    desc:'Baseline week · very simple, mostly assemble-fast options',

// Week of month: day 1-7=week1, 8-14=week2, 15-21=week3, 22-28=week4, 29+=week1
function weekOfMonth(date) {
  const w = Math.ceil(date.getDate() / 7);
  return w > 4 ? 1 : w;
}

// Day index: 0=Monday … 6=Sunday
function dayIndex(date) {
  const raw = date.getDay(); // 0=Sun, 1=Mon…6=Sat
  return raw === 0 ? 6 : raw - 1;
}

function fmtDate(d){ return MSHORT[d.getMonth()] + ' ' + d.getDate(); }

function weekRange(){
  const d = new Date(TODAY);
  const dow = d.getDay();
  const diff = dow === 0 ? -6 : 1 - dow;
  const mon = new Date(d); mon.setDate(d.getDate() + diff);
  const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
  return MSHORT[mon.getMonth()] + ' ' + mon.getDate() + '–' + sun.getDate();
}

════════════════════════════════════ */
function loadState(){
  try {
    var saved = JSON.parse(localStorage.getItem(LS_KEY) || '{}');
    if(saved.person && PERSONS[saved.person]) STATE.person = saved.person;
    if(Array.isArray(saved.checked)) STATE.checked = new Set(saved.checked);
    if(saved.selected && typeof saved.selected === 'object') STATE.selected = saved.selected;
  } catch(e) {
    console.warn('Could not load saved meal planner state', e);
  }
}

function saveState(){
  try {
    localStorage.setItem(LS_KEY, JSON.stringify({
      person: STATE.person,
      checked: Array.from(STATE.checked),
      selected: STATE.selected
    }));
  } catch(e) {
    console.warn('Could not save meal planner state', e);
  }
}

function mealKey(dateKey, mealIdx){
  return STATE.person + '-' + dateKey + '-meal' + mealIdx;
}

function selectMealOption(dateKey, mealIdx, optIdx){
  STATE.selected[mealKey(dateKey, mealIdx)] = optIdx;
  saveState();
  renderCurrent();
}

function getSelectedOption(dateKey, mealIdx){
  var key = mealKey(dateKey, mealIdx);
  return Object.prototype.hasOwnProperty.call(STATE.selected, key) ? STATE.selected[key] : null;
}

/* ════════════════════════════════════
   HELPERS
════════════════════════════════════ */
function mac(p, c){
  return '<span class="mac p">'+p+'g</span><span class="mac c">'+c+' kcal</span>';
}

function macSm(p, c){
  return '<div class="mini-macs"><span class="mac p">'+p+'g</span><span class="mac c">'+c+'</span></div>';
}

function dayRange(dayData, pF, cF){
  let minP=0,maxP=0,minC=0,maxC=0;
  dayData.meals.forEach(function(meal){
    var p0=Math.round(meal.opts[0].p*pF), p1=Math.round(meal.opts[1].p*pF);
    var c0=Math.round(meal.opts[0].c*cF), c1=Math.round(meal.opts[1].c*cF);
    minP+=Math.min(p0,p1); maxP+=Math.max(p0,p1);
    minC+=Math.min(c0,c1); maxC+=Math.max(c0,c1);
  });
  return {minP:minP, maxP:maxP, minC:minC, maxC:maxC};
}

function getPortionHint(mealName, person){
  var n = mealName.toLowerCase();
  var g = (person === 'gyaan');
  var parts = [];
  if(n.includes('chicken'))                          parts.push(g ? '160g chicken' : '120g chicken');
  if(n.includes('paneer'))                           parts.push(g ? '100g paneer'  : '80g paneer');
  if(n.includes('omelette'))                         parts.push(g ? '3 eggs'       : '2 eggs');
  else if(n.includes('egg bhurji') || n.includes('egg roll') || n.includes('egg sandwich') || n.includes('boiled egg'))
                                                     parts.push(g ? '3 eggs'       : '2 eggs');
  else if(n.includes('egg') || n.includes('eggs'))   parts.push(g ? '2–3 eggs'     : '2 eggs');
  if(n.includes('whey') && !n.includes('skip'))      parts.push(g ? '1 scoop (25g)': '— skip whey');
  if(n.includes('dal'))                              parts.push(g ? '1½ cup dal'   : '1 cup dal');
  if(n.includes('rice'))                             parts.push(g ? '¾ cup rice'   : '½ cup rice');
  if(n.includes('roti'))                             parts.push(g ? '2 roti'       : '1½ roti');
  if(n.includes('bread') || n.includes('toast') || n.includes('sandwich'))
                                                     parts.push(g ? '2 slices'     : '1½ slices');
  if(n.includes('curd') || n.includes('yogurt'))     parts.push(g ? '150g curd'    : '100g curd');
  if(n.includes('milk') && !n.includes('whey'))      parts.push(g ? '300ml milk'   : '200ml milk');
  if(n.includes('poha'))                             parts.push(g ? '1 cup poha'   : '¾ cup poha');
  if(n.includes('upma'))                             parts.push(g ? '1 cup upma'   : '¾ cup upma');
  if(n.includes('banana'))                           parts.push('1 banana');
  return parts.join(' · ');
}

function renderOptRow(opt, i, pF, cF, person, dateKey, mealIdx){
  var portion = getPortionHint(opt.n, person);
  var query = encodeURIComponent(opt.n + ' recipe indian');
  var ytUrl = 'https://www.youtube.com/results?search_query=' + query;
  var selectable = dateKey !== undefined && mealIdx !== undefined;
  var selected = selectable && getSelectedOption(dateKey, mealIdx) === i;
  var clickAttr = selectable ? ' onclick="selectMealOption(\''+dateKey+'\','+mealIdx+','+i+')"' : '';
  var cls = 'opt-row' + (selectable ? ' selectable' : '') + (selected ? ' selected' : '');
  return '<div class="'+cls+'"'+clickAttr+'>'+
    '<div style="flex:1">'+
      '<span class="opt-num">OPT '+(i+1)+'</span>'+
      '<div class="opt-name">'+opt.n+'</div>'+
      (portion ? '<div class="opt-portion">'+portion+'</div>' : '')+
      (selected ? '<div class="selected-note">Selected for today</div>' : '')+
    '</div>'+
    '<div style="display:flex;align-items:center;gap:7px;flex-shrink:0">'+
      '<div class="opt-macs">'+mac(Math.round(opt.p*pF), Math.round(opt.c*cF))+'</div>'+
      '<a href="'+ytUrl+'" target="_blank" class="yt-btn" onclick="event.stopPropagation()">▶️</a>'+
    '</div>'+
  '</div>';
}

/* ════════════════════════════════════
   RENDER TODAY
════════════════════════════════════ */
function renderToday(){
  var per = PERSONS[STATE.person];
  var pF = per.pFactor, cF = per.cFactor;

  document.getElementById('dayName').textContent = DAYS[DAY_I];
  document.getElementById('daySubtitle').textContent =
    MONTHS[TODAY.getMonth()] + ' ' + TODAY.getDate() + ' · Week ' + WEEK_N + ' of ' + MONTHS[TODAY.getMonth()];

  // Low protein alert for Gyaan
  var alertHtml = '';
  if(STATE.person === 'gyaan'){
    var bestBfast = Math.max(TODAY_D.meals[0].opts[0].p, TODAY_D.meals[0].opts[1].p);
    if(bestBfast < 20){
      alertHtml = '<div class="protein-alert"><span>⚠️</span><span><strong>Low-protein breakfast day.</strong> Pick Option 2 at breakfast — or add 2 boiled eggs to your choice — to stay on track for 100g+.</span></div>';
    }
  }
  document.getElementById('alertBox').innerHTML = alertHtml;

  // Meals
  var todayDateKey = WEEK_K + '-' + DAY_I;
  var mealsHtml = TODAY_D.meals.map(function(meal, mealIdx){
    var optsHtml = meal.opts.map(function(opt, i){
      return renderOptRow(opt, i, pF, cF, STATE.person, todayDateKey, mealIdx);
    }).join('');
    return '<div class="meal-card">'+
      '<div class="mc-hd"><span class="mc-emoji">'+meal.ic+'</span><span class="mc-title">'+meal.title+'</span><span class="mc-time">'+meal.time+'</span></div>'+
      optsHtml+'</div>';
  }).join('');
  document.getElementById('todayMeals').innerHTML = mealsHtml;

  // Snack
  var sk = per.snack;
  document.getElementById('snackCard').innerHTML =
    '<div class="snack-card '+STATE.person+'">'+
      '<span class="snack-emoji">'+sk.emoji+'</span>'+
      '<div class="snack-body"><div class="snack-title">Snack · '+sk.label+'</div><div class="snack-desc">'+sk.desc+'</div></div>'+
      '<div class="snack-macs">'+mac(sk.pro, sk.cal)+'</div>'+
    '</div>';

  // Day totals
  var r = dayRange(TODAY_D, pF, cF);
  var selectedP = sk.pro, selectedC = sk.cal, selectedCount = 0;
  TODAY_D.meals.forEach(function(meal, mealIdx){
    var si = getSelectedOption(todayDateKey, mealIdx);
    if(si !== null){
      selectedCount++;
      selectedP += Math.round(meal.opts[si].p*pF);
      selectedC += Math.round(meal.opts[si].c*cF);
    }
  });

  var wMinP = r.minP + sk.pro, wMaxP = r.maxP + sk.pro;
  var wMinC = r.minC + sk.cal, wMaxC = r.maxC + sk.cal;
  var showSelected = selectedCount > 0;
  var displayP = showSelected ? selectedP : Math.round((wMinP+wMaxP)/2);
  var displayC = showSelected ? selectedC : Math.round((wMinC+wMaxC)/2);
  var tgtMidP = (per.proMin+per.proMax)/2, tgtMidC = (per.calMin+per.calMax)/2;
  var pPct = Math.min(100, Math.round(displayP/tgtMidP*100));
  var cPct = Math.min(100, Math.round(displayC/tgtMidC*100));
  var footerText = showSelected
    ? 'Selected '+selectedCount+'/'+TODAY_D.meals.length+' meals · snack included'
    : 'Tap Option 1 or 2 to calculate selected totals';

  document.getElementById('dayTotal').innerHTML =
    '<div class="day-total">'+
      '<div class="dt-label-top">'+(showSelected ? 'Selected Total' : 'Estimated Day Range')+'</div>'+
      '<div class="dt-block">'+
        '<div class="dt-top"><span class="dt-key">Protein</span><span class="dt-val">'+(showSelected ? selectedP+'g' : wMinP+'–'+wMaxP+'g')+'</span></div>'+
        '<div class="dt-bar"><div class="dt-fill" style="width:'+pPct+'%"></div></div>'+
        '<div class="dt-sub">Target: '+per.proMin+'–'+per.proMax+'g</div>'+
      '</div>'+
      '<div class="dt-block">'+
        '<div class="dt-top"><span class="dt-key">Calories</span><span class="dt-val">'+(showSelected ? selectedC : wMinC+'–'+wMaxC)+'</span></div>'+
        '<div class="dt-bar"><div class="dt-fill" style="width:'+cPct+'%"></div></div>'+
        '<div class="dt-sub">Target: '+per.calMin+'–'+per.calMax+' kcal</div>'+
      '</div>'+
      '<div class="dt-footer">'+footerText+'</div>'+
    '</div>';

  // Tomorrow + Day2 section (5 PM+)
  var tmrHtml = '';
  if(IS_NIGHT){
    function buildDayCards(dayData, dayLabel, weekNote){
      var mHtml = dayData.meals.map(function(meal){
        var optsHtml = meal.opts.map(function(opt, i){
          return renderOptRow(opt, i, pF, cF, STATE.person);
        }).join('');
        return '<div class="meal-card">'+
          '<div class="mc-hd"><span class="mc-emoji">'+meal.ic+'</span><span class="mc-title">'+meal.title+'</span><span class="mc-time">'+meal.time+'</span></div>'+
          optsHtml+'</div>';
      }).join('');
      return '<div class="section-divider">'+
          '<div class="sd-line"></div>'+
          '<span class="sd-label">'+dayLabel+'</span>'+
          '<span class="sd-chip">'+DAYS[dayIndex(new Date(TODAY.getFullYear(), TODAY.getMonth(), TODAY.getDate() + (dayLabel==='Tomorrow'?1:2)))]+(weekNote?' · Week '+weekNote:'')+'</span>'+
          '<div class="sd-line"></div>'+
        '</div>'+ mHtml;
    }
    var tmrWeekNote = (TMR_WEEK_N !== WEEK_N) ? TMR_WEEK_N : '';
    var day2WeekNote = (DAY2_WEEK_N !== WEEK_N) ? DAY2_WEEK_N : '';
    tmrHtml = buildDayCards(TMR_D, 'Tomorrow', tmrWeekNote) +
              buildDayCards(DAY2_D, 'Day After', day2WeekNote);
  }
  document.getElementById('tomorrowSection').innerHTML = tmrHtml;
}

/* ════════════════════════════════════
   RENDER WEEK
════════════════════════════════════ */
function renderWeek(){
  var per = PERSONS[STATE.person];
  var pF = per.pFactor, cF = per.cFactor;

  document.getElementById('weekTitle').textContent = 'Week ' + WEEK_N;
  document.getElementById('weekDesc').textContent = WEEK_D.desc;

  var html = WEEK_D.days.map(function(dayData, idx){
    var isToday = (idx === DAY_I);
    var r = dayRange(dayData, pF, cF);
    var abbr = DAYS[idx].slice(0,3).toUpperCase();

    var mealsHtml = dayData.meals.map(function(meal){
      var optsHtml = meal.opts.map(function(opt, i){
        var query = encodeURIComponent(opt.n + ' recipe indian');
        var ytUrl = 'https://www.youtube.com/results?search_query=' + query;
        return '<div class="mini-opt">'+
          '<span class="mini-tag">O'+(i+1)+'</span>'+
          '<span class="mini-name">'+opt.n+'</span>'+
          macSm(Math.round(opt.p*pF), Math.round(opt.c*cF))+
          '<a href="'+ytUrl+'" target="_blank" class="yt-btn" style="width:24px;height:24px;font-size:11px">▶️</a>'+
        '</div>';
      }).join('');
      return '<div class="mini-meal"><div class="mini-title">'+meal.ic+' '+meal.title+'</div>'+optsHtml+'</div>';
    }).join('');

    return '<div class="day-acc'+(isToday?' today-acc open':'')+'" id="dacc'+idx+'">'+
      '<button class="day-acc-btn" onclick="toggleDay('+idx+')">'+
        '<div class="day-dot'+(isToday?' today-dot':'')+'">'+
          '<span>'+abbr+'</span>'+
          '<span>'+(isToday?'NOW':'')+'</span>'+
        '</div>'+
        '<div style="flex:1">'+
          '<div class="dai-name">'+dayData.name+(isToday?'<span class="today-badge">Today</span>':'')+'</div>'+
          '<div class="dai-note">'+dayData.note+'</div>'+
        '</div>'+
        '<div class="day-meta">'+
          '<div class="day-meta-pro">↑'+r.maxP+'g</div>'+
          '<div class="day-meta-cal">'+r.maxC+' kcal</div>'+
        '</div>'+
        '<span class="acc-arrow">⌄</span>'+
      '</button>'+
      '<div class="day-acc-body">'+mealsHtml+'</div>'+
    '</div>';
  }).join('');

  document.getElementById('weekDays').innerHTML = html;

  // Next week section (Fri/Sat/Sun only)
  var nwHtml = '';
  if(IS_WEEK_END){
    var nwDays = NEXT_WEEK_D.days.map(function(dayData, idx){
      var r = dayRange(dayData, pF, cF);
      var abbr = DAYS[idx].slice(0,3).toUpperCase();
      var mealsHtml = dayData.meals.map(function(meal){
        var optsHtml = meal.opts.map(function(opt, i){
          return '<div class="mini-opt"><span class="mini-tag">O'+(i+1)+'</span><span class="mini-name">'+opt.n+'</span>'+macSm(Math.round(opt.p*pF), Math.round(opt.c*cF))+'</div>';
        }).join('');
        return '<div class="mini-meal"><div class="mini-title">'+meal.ic+' '+meal.title+'</div>'+optsHtml+'</div>';
      }).join('');
      return '<div class="day-acc next-week-acc" id="nwdacc'+idx+'">'+
        '<button class="day-acc-btn" onclick="toggleNwDay('+idx+')">'+
          '<div class="day-dot"><span>'+abbr+'</span><span></span></div>'+
          '<div style="flex:1">'+
            '<div class="dai-name">'+dayData.name+'</div>'+
            '<div class="dai-note">'+dayData.note+'</div>'+
          '</div>'+
          '<div class="day-meta">'+
            '<div class="day-meta-pro">↑'+r.maxP+'g</div>'+
            '<div class="day-meta-cal">'+r.maxC+' kcal</div>'+
          '</div>'+
          '<span class="acc-arrow">⌄</span>'+
        '</button>'+
        '<div class="day-acc-body">'+mealsHtml+'</div>'+
      '</div>';
    }).join('');

    nwHtml =
      '<div class="section-divider">'+
        '<div class="sd-line"></div>'+
        '<span class="sd-label">Next Week</span>'+
        '<span class="sd-chip">Week '+NEXT_WEEK_N+'</span>'+
        '<div class="sd-line"></div>'+
      '</div>'+
      '<div class="nw-week-header">'+
        '<div>'+
          '<div class="nw-week-title">Week '+NEXT_WEEK_N+'</div>'+
          '<div class="nw-week-desc">'+NEXT_WEEK_D.desc+'</div>'+
        '</div>'+
      '</div>'+
      nwDays;
  }
  document.getElementById('weekDays').innerHTML = html + nwHtml;
}

/* ════════════════════════════════════
   RENDER SHOPPING
════════════════════════════════════ */
function renderShopping(){
  document.getElementById('shopSub').textContent = 'Week ' + WEEK_N + ' · ' + weekRange();
  renderWeeklyShop();
  renderDailyShop();
}

function shopItem(key, name, qty){
  var done = STATE.checked.has(key);
  return '<div class="shop-item'+(done?' done':'')+'" onclick="toggleCheck(\''+key+'\',this)">'+
    '<div class="chk">'+(done?'✓':'')+'</div>'+
    '<span class="si-name">'+name+'</span>'+
    '<span class="si-qty">'+qty+'</span>'+
  '</div>';
}

function shopGroup(label, items, prefix){
  return '<div class="shop-group"><div class="sg-label">'+label+'</div>'+
    items.map(function(it,i){ return shopItem(prefix+'-'+i, it.n, it.q); }).join('')+
  '</div>';
}

function renderWeeklyShop(){
  var w = SHOP.weekly[WEEK_K];
  document.getElementById('sp-weekly').innerHTML =
    shopGroup('🥩 Proteins', w.proteins, 'wp') +
    shopGroup('🌾 Carbs & Staples', w.carbs, 'wc') +
    shopGroup('🥬 Fresh Produce', w.produce, 'wv') +
    shopGroup('🫙 Pantry', w.pantry, 'wpa') +
    '<div class="shop-note-box">💡 <strong>Weekly shop = ~70% of your meals.</strong> Buy chicken in 2–3 batches (not all at once). Paneer keeps 3–4 days once opened.</div>';
}

function renderDailyShop(){
  document.getElementById('sp-daily').innerHTML =
    shopGroup('🥛 Buy Daily (or every 2 days)', SHOP.daily.everyday, 'de') +
    shopGroup('🍋 Alternate Day Top-up', SHOP.daily.altday, 'da') +
    shopGroup('📦 Weekly Once', SHOP.daily.once, 'do') +
    '<div class="shop-note-box">💡 <strong>The 3 things to never run out of:</strong> milk, curd, bananas. Everything else can wait 2 days. Buy fruit based on what looks good that day.</div>';
}

/* ════════════════════════════════════
   INTERACTIONS
════════════════════════════════════ */
function setPerson(p, btn){
  STATE.person = p;
  saveState();
  document.querySelectorAll('.p-btn').forEach(function(b){ b.classList.remove('on'); });
  btn.classList.add('on');
  updateStats();
  renderCurrent();
}

function setTab(tab, btn){
  STATE.tab = tab;
  document.querySelectorAll('.tab-panel').forEach(function(el){ el.classList.remove('on'); });
  document.getElementById('tab-'+tab).classList.add('on');
  document.querySelectorAll('.nb').forEach(function(b){ b.classList.remove('on'); });
  btn.classList.add('on');
  renderCurrent();
}

function setShopTab(tab, btn){
  document.querySelectorAll('.st-btn').forEach(function(b){ b.classList.remove('on'); });
  btn.classList.add('on');
  document.querySelectorAll('.shop-panel').forEach(function(el){ el.classList.remove('on'); });
  document.getElementById('sp-'+tab).classList.add('on');
}

function toggleDay(idx){
  document.getElementById('dacc'+idx).classList.toggle('open');
}

function toggleNwDay(idx){
  document.getElementById('nwdacc'+idx).classList.toggle('open');
}

function toggleCheck(key, el){
  if(STATE.checked.has(key)){
    STATE.checked.delete(key);
    el.classList.remove('done');
    el.querySelector('.chk').textContent = '';
  } else {
    STATE.checked.add(key);
    el.classList.add('done');
    el.querySelector('.chk').textContent = '✓';
  }
  saveState();
}

function renderCurrent(){
  if(STATE.tab==='today') renderToday();
  else if(STATE.tab==='week') renderWeek();
  else renderShopping();
}

function updateStats(){
  var per = PERSONS[STATE.person];
  document.getElementById('statsBar').innerHTML =
    '<span class="s-chip pro">🥩 '+per.proMin+'–'+per.proMax+'g protein</span>'+
    '<span class="s-chip cal">🔥 '+per.calMin+'–'+per.calMax+' kcal</span>'+
    '<span class="s-note">'+per.note+'</span>';
}

/* ════════════════════════════════════
   INIT
════════════════════════════════════ */
(function init(){
  loadState();
  document.getElementById('weekChip').textContent = 'Week ' + WEEK_N + ' · ' + fmtDate(TODAY);
  document.querySelectorAll('.p-btn').forEach(function(b){
    b.classList.toggle('on', b.getAttribute('data-p') === STATE.person);
  });
  updateStats();
  renderToday();
})();
</script>
